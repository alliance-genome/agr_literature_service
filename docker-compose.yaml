version: "3.7"

services:
  postgres:
    image: postgres:13.1-alpine
    hostname: postgres
    restart: always
    environment:
      POSTGRES_USER: ${PSQL_USERNAME}
      POSTGRES_PASSWORD: ${PSQL_PASSWORD}
      POSTGRES_DB: ${PSQL_DATABASE}
    shm_size: '1g'
    volumes:
      - "agr-literature-pg-data:/var/lib/postgresql/data"
      - "./postgresql.conf:/etc/postgresql.conf"
    networks:
      - agr-literature
    # ports needed by pgadmin to connect through host.docker.internal
    ports:
      - "${PSQL_PORT}:${PSQL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PSQL_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      postgres -c config_file=/etc/postgresql.conf -p ${PSQL_PORT}


  pgadmin:
    image: dpage/pgadmin4:5.1
    hostname: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_ACCESS_CONTROL_ALLOW_ORIGIN: "*"
      PGADMIN_LISTEN_PORT: 81
    ports:
      - "${PGADMIN_PORT}:81"
    volumes:
      - "agr-literature-pgadmin-data:/var/lib/pgadmin"
    networks:
      - agr-literature
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.1
    hostname: elasticsearch
    restart: always
    environment:
      - node.name=aws-literature-es1
      - cluster.name=es-docker-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "http.cors.enabled=true"
      - "http.cors.allow-origin=*"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - "agr-literature-es-data:/usr/share/elasticsearch/data"
    ports:
      - "${ELASTICSEARCH_PORT}:${ELASTICSEARCH_PORT}"
    networks:
      - agr-literature

  api:
    container_name: agr.literature.${ENV_STATE}.api.server.${COMPOSE_PROJECT_NAME}
    restart: always
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    build:
      context: .
      dockerfile: docker/api.dockerfile
      args:
        REG: ${REG}
        ALLIANCE_RELEASE: ${ALLIANCE_RELEASE}
    environment:
      API_PORT: "${API_PORT}"
      API_SERVER: "${API_SERVER}"
      PYTHONPATH: "/usr/local/bin/src/literature/"
      XML_PATH: "/usr/local/bin/src/literature/agr_literature_service/lit_processing/data_ingest/tmp/"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      COGNITO_ADMIN_CLIENT_ID: "${COGNITO_ADMIN_CLIENT_ID}"
      COGNITO_ADMIN_CLIENT_SECRET: "${COGNITO_ADMIN_CLIENT_SECRET}"
      COGNITO_TOKEN_URL: "${COGNITO_TOKEN_URL}"
      ENV_STATE: "${ENV_STATE}"
      ID_MATI_URL: "${ID_MATI_URL}"
      PSQL_USERNAME: "${PSQL_USERNAME}"
      PSQL_PASSWORD: "${PSQL_PASSWORD}"
      PSQL_HOST: "${PSQL_HOST}"
      PSQL_PORT: "${PSQL_PORT}"
      PSQL_DATABASE: "${PSQL_DATABASE}"
      PERSISTENT_STORE_DB_USERNAME: "${PERSISTENT_STORE_DB_USERNAME}"
      PERSISTENT_STORE_DB_PASSWORD: "${PERSISTENT_STORE_DB_PASSWORD}"
      PERSISTENT_STORE_DB_HOST: "${PERSISTENT_STORE_DB_HOST}"
      PERSISTENT_STORE_DB_PORT: "${PERSISTENT_STORE_DB_PORT}"
      PERSISTENT_STORE_DB_NAME: "${PERSISTENT_STORE_DB_NAME}"
      RESOURCE_DESCRIPTOR_URL: "${RESOURCE_DESCRIPTOR_URL}"
      HOST: "${HOST}"
      COGNITO_REGION: "${COGNITO_REGION}"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
      COGNITO_ALLOWED_CLIENT_IDS: "${COGNITO_ALLOWED_CLIENT_IDS}"
      OKTA_DOMAIN: "${OKTA_DOMAIN}"
      OKTA_API_AUDIENCE: "${OKTA_API_AUDIENCE}"
      OKTA_CLIENT_ID: "${OKTA_CLIENT_ID}"
      OKTA_CLIENT_SECRET: "${OKTA_CLIENT_SECRET}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST}"
      ELASTICSEARCH_PORT: "${ELASTICSEARCH_PORT}"
      ELASTICSEARCH_INDEX: "${ELASTICSEARCH_INDEX}"
      LOG_PATH: "/var/log/automated_scripts/"
      LOG_URL: "${LOG_URL}"
      CRONTAB_EMAIL: "${CRONTAB_EMAIL}"
      SENDER_EMAIL: "${SENDER_EMAIL}"
      SENDER_PASSWORD: "${SENDER_PASSWORD}"
      REPLY_TO: "${REPLY_TO}"
      ATEAM_API_URL: "${ATEAM_API_URL}"
      SGD_API_URL: "${SGD_API_URL}"
      PDFX_API_URL: "${PDFX_API_URL}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-4}"  # Number of worker processes (default: 4)
      LOG_LEVEL: "${LOG_LEVEL:-info}"  # Gunicorn log level (default: info)
      DEBEZIUM_STATUS_PATH: "${DEBEZIUM_STATUS_PATH:-/var/lib/debezium_status}"
      SKIP_AUTH_ON_READ_ENDPOINTS_FOR_IP: "${SKIP_AUTH_ON_READ_ENDPOINTS_FOR_IP}"
      SKIP_AUTH_ON_ALL_ENDPOINTS_FOR_IP: "${SKIP_AUTH_ON_ALL_ENDPOINTS_FOR_IP}"
    hostname: literature_api
    networks:
      - agr-literature
    volumes:
      - "${LOG_PATH}:/var/log/automated_scripts"
      - "${DEBEZIUM_STATUS_PATH:-agr-literature-debezium-status}:/var/lib/debezium_status"
    ports:
      - "${API_PORT}:8080"

  xml_processing:
    container_name: agr.literature.${ENV_STATE}.xml_processing.${COMPOSE_PROJECT_NAME}
    restart: always
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    build:
      context: .
      dockerfile: docker/xml_processing.dockerfile
      args:
        REG: ${REG}
        ALLIANCE_RELEASE: ${ALLIANCE_RELEASE}
    hostname: literature_xml_processing
    environment:
      API_PORT: "${API_PORT}"
      API_SERVER: "${API_SERVER}"
      PYTHONPATH: "/usr/local/bin/src/literature/"
      XML_PATH: "/usr/local/bin/src/literature/agr_literature_service/lit_processing/data_ingest/tmp/"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      COGNITO_ADMIN_CLIENT_ID: "${COGNITO_ADMIN_CLIENT_ID}"
      COGNITO_ADMIN_CLIENT_SECRET: "${COGNITO_ADMIN_CLIENT_SECRET}"
      COGNITO_TOKEN_URL: "${COGNITO_TOKEN_URL}"
      ENV_STATE: "${ENV_STATE}"
      ID_MATI_URL: "${ID_MATI_URL}"
      HOST: "${HOST}"
      COGNITO_REGION: "${COGNITO_REGION}"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
      OKTA_DOMAIN: "${OKTA_DOMAIN}"
      OKTA_API_AUDIENCE: "${OKTA_API_AUDIENCE}"
      OKTA_CLIENT_ID: "${OKTA_CLIENT_ID}"
      OKTA_CLIENT_SECRET: "${OKTA_CLIENT_SECRET}"
      PSQL_USERNAME: "${PSQL_USERNAME}"
      PSQL_PASSWORD: "${PSQL_PASSWORD}"
      PSQL_HOST: "${PSQL_HOST}"
      PSQL_PORT: "${PSQL_PORT}"
      PSQL_DATABASE: "${PSQL_DATABASE}"
      RESOURCE_DESCRIPTOR_URL: "${RESOURCE_DESCRIPTOR_URL}"
      REG: "${REG}"
    networks:
      - agr-literature
    volumes:
      - agr-logs:/logs
    depends_on:
      - api

  automated_scripts:
    container_name: agr.literature.${ENV_STATE}.automated_scripts.${COMPOSE_PROJECT_NAME}
    restart: always
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    build:
      context: .
      dockerfile: docker/automated_scripts.dockerfile
      args:
        REG: ${REG}
        ALLIANCE_RELEASE: ${ALLIANCE_RELEASE}
    environment:
      PYTHONPATH: "/usr/src/app"
      XML_PATH: "/usr/src/app/agr_literature_service/lit_processing/data_ingest/tmp/"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      COGNITO_ADMIN_CLIENT_ID: "${COGNITO_ADMIN_CLIENT_ID}"
      COGNITO_ADMIN_CLIENT_SECRET: "${COGNITO_ADMIN_CLIENT_SECRET}"
      COGNITO_TOKEN_URL: "${COGNITO_TOKEN_URL}"
      ENV_STATE: "${ENV_STATE}"
      ID_MATI_URL: "${ID_MATI_URL}"
      HOST: "${HOST}"
      COGNITO_REGION: "${COGNITO_REGION}"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
      OKTA_DOMAIN: "${OKTA_DOMAIN}"
      OKTA_API_AUDIENCE: "${OKTA_API_AUDIENCE}"
      OKTA_CLIENT_ID: "${OKTA_CLIENT_ID}"
      OKTA_CLIENT_SECRET: "${OKTA_CLIENT_SECRET}"
      PSQL_USERNAME: "${PSQL_USERNAME}"
      PSQL_PASSWORD: "${PSQL_PASSWORD}"
      PSQL_HOST: "${PSQL_HOST}"
      PSQL_PORT: "${PSQL_PORT}"
      PSQL_DATABASE: "${PSQL_DATABASE}"
      RESOURCE_DESCRIPTOR_URL: "${RESOURCE_DESCRIPTOR_URL}"
      REG: "${REG}"
      NCBI_API_KEY: "${NCBI_API_KEY}"
      LOG_PATH: "/var/log/automated_scripts/"
      LOG_URL: "${LOG_URL}"
      CRONTAB_EMAIL: "${CRONTAB_EMAIL}"
      SENDER_EMAIL: "${SENDER_EMAIL}"
      SENDER_PASSWORD: "${SENDER_PASSWORD}"
      REPLY_TO: "${REPLY_TO}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST}"
      ELASTICSEARCH_PORT: "${ELASTICSEARCH_PORT}"
      ELASTICSEARCH_INDEX: "${ELASTICSEARCH_INDEX}"
      API_PORT: "${API_PORT}"
      API_SERVER: "${API_SERVER}"
      ATEAM_API_URL: "${ATEAM_API_URL}"
      DEBEZIUM_CONNECTOR_HOST: "${DEBEZIUM_CONNECTOR_HOST}"
      DEBEZIUM_CONNECTOR_PORT: "${DEBEZIUM_CONNECTOR_PORT}"
      DEBEZIUM_INDEX_NAME: "${DEBEZIUM_INDEX_NAME}"
      DEBEZIUM_KSQLDB_HOST: "${DEBEZIUM_KSQLDB_HOST}"
      DEBEZIUM_KSQLDB_PORT: "${DEBEZIUM_KSQLDB_PORT}"
      TZ: "UTC"
      PDFX_API_URL: "${PDFX_API_URL}"
      SGD_API_URL: "${SGD_API_URL}"
      PERSISTENT_STORE_DB_USERNAME: "${PERSISTENT_STORE_DB_USERNAME}"
      PERSISTENT_STORE_DB_PASSWORD: "${PERSISTENT_STORE_DB_PASSWORD}"
      PERSISTENT_STORE_DB_HOST: "${PERSISTENT_STORE_DB_HOST}"
      PERSISTENT_STORE_DB_PORT: "${PERSISTENT_STORE_DB_PORT}"
      PERSISTENT_STORE_DB_NAME: "${PERSISTENT_STORE_DB_NAME}"
    volumes:
      - "${LOG_PATH}:/var/log/automated_scripts"
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/local/bin/docker-compose:/usr/bin/docker-compose
    networks:
      - agr-literature

  test_runner:
    build:
      context: .
      dockerfile: docker/test_runner.dockerfile
      args:
        REG: ${REG}
        ALLIANCE_RELEASE: ${ALLIANCE_RELEASE}
    hostname: test_runner
    environment:
      API_PORT: "${API_PORT}"
      API_SERVER: "${API_SERVER}"
      PYTHONPATH: "/usr/local/bin/src/literature/"
      XML_PATH: "/usr/local/bin/src/literature/agr_literature_service/lit_processing/tests/tmp/"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      COGNITO_ADMIN_CLIENT_ID: "${COGNITO_ADMIN_CLIENT_ID}"
      COGNITO_ADMIN_CLIENT_SECRET: "${COGNITO_ADMIN_CLIENT_SECRET}"
      COGNITO_TOKEN_URL: "${COGNITO_TOKEN_URL}"
      ENV_STATE: "${ENV_STATE}"
      ID_MATI_URL: "${ID_MATI_URL}"
      HOST: "${HOST}"
      COGNITO_REGION: "${COGNITO_REGION}"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
      COGNITO_ALLOWED_CLIENT_IDS: "${COGNITO_ALLOWED_CLIENT_IDS}"
      OKTA_DOMAIN: "${OKTA_DOMAIN}"
      OKTA_API_AUDIENCE: "${OKTA_API_AUDIENCE}"
      OKTA_CLIENT_ID: "${OKTA_CLIENT_ID}"
      OKTA_CLIENT_SECRET: "${OKTA_CLIENT_SECRET}"
      PSQL_USERNAME: "${PSQL_USERNAME}"
      PSQL_PASSWORD: "${PSQL_PASSWORD}"
      PSQL_HOST: "${PSQL_HOST}"
      PSQL_PORT: "${PSQL_PORT}"
      PSQL_DATABASE: "${PSQL_DATABASE}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST}"
      ELASTICSEARCH_PORT: "${ELASTICSEARCH_PORT}"
      ELASTICSEARCH_INDEX: "${ELASTICSEARCH_INDEX}"
      RESOURCE_DESCRIPTOR_URL: "${RESOURCE_DESCRIPTOR_URL}"
      REG: "${REG}"
    volumes:
      - agr-logs:/logs
      - .:/usr/local/bin/src/literature
    networks:
      - agr-literature

  dev_app:
    restart: always
    build:
      context: .
      dockerfile: docker/dev-app.dockerfile
      args:
        REG: ${REG}
        ALLIANCE_RELEASE: ${ALLIANCE_RELEASE}
    hostname: dev_app
    environment:
      API_PORT: "8080"
      API_SERVER: "localhost"
      PYTHONPATH: "/usr/local/bin/src/literature/"
      XML_PATH: "/usr/local/bin/src/literature/agr_literature_service/lit_processing/data_ingest/tmp/"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      COGNITO_ADMIN_CLIENT_ID: "${COGNITO_ADMIN_CLIENT_ID}"
      COGNITO_ADMIN_CLIENT_SECRET: "${COGNITO_ADMIN_CLIENT_SECRET}"
      COGNITO_TOKEN_URL: "${COGNITO_TOKEN_URL}"
      ENV_STATE: "${ENV_STATE}"
      ID_MATI_URL: "${ID_MATI_URL}"
      ATEAM_API_URL: "${ATEAM_API_URL}"
      PDFX_API_URL: "${PDFX_API_URL}"
      PSQL_USERNAME: "${PSQL_USERNAME}"
      PSQL_PASSWORD: "${PSQL_PASSWORD}"
      PSQL_HOST: "${PSQL_HOST}"
      PSQL_PORT: "${PSQL_PORT}"
      PSQL_DATABASE: "${PSQL_DATABASE}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST}"
      ELASTICSEARCH_PORT: "${ELASTICSEARCH_PORT}"
      ELASTICSEARCH_INDEX: "${ELASTICSEARCH_INDEX}"
      RESOURCE_DESCRIPTOR_URL: "${RESOURCE_DESCRIPTOR_URL}"
      HOST: "${HOST}"
      COGNITO_REGION: "${COGNITO_REGION}"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID}"
      COGNITO_CLIENT_ID: "${COGNITO_CLIENT_ID}"
      COGNITO_ALLOWED_CLIENT_IDS: "${COGNITO_ALLOWED_CLIENT_IDS}"
      OKTA_DOMAIN: "${OKTA_DOMAIN}"
      OKTA_API_AUDIENCE: "${OKTA_API_AUDIENCE}"
      OKTA_CLIENT_ID: "${OKTA_CLIENT_ID}"
      OKTA_CLIENT_SECRET: "${OKTA_CLIENT_SECRET}"
      REG: "${REG}"
      SKIP_AUTH_ON_READ_ENDPOINTS_FOR_IP: "${SKIP_AUTH_ON_READ_ENDPOINTS_FOR_IP}"
      SKIP_AUTH_ON_ALL_ENDPOINTS_FOR_IP: "${SKIP_AUTH_ON_ALL_ENDPOINTS_FOR_IP}"
    ports:
      - "${API_PORT}:8080"
    networks:
      - agr-literature
    volumes:
      - agr-logs:/logs
      - .:/usr/local/bin/src/literature

  dbz_zookeeper:
    container_name: agr.literature.${ENV_STATE}.dbz.zookeeper.${COMPOSE_PROJECT_NAME}
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    image: quay.io/debezium/zookeeper:${DEBEZIUM_VERSION}
    ports:
      - 2181:2181
      - 2888:2888
      - 3888:3888
    networks:
      - agr-literature

  dbz_kafka:
    container_name: agr.literature.${ENV_STATE}.dbz.kafka.${COMPOSE_PROJECT_NAME}
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    image: quay.io/debezium/kafka:${DEBEZIUM_VERSION}
    ports:
      - 9092:9092
    environment:
      - ZOOKEEPER_CONNECT=dbz_zookeeper:2181
      - KAFKA_MESSAGE_MAX_BYTES=200000000
      - KAFKA_SOCKET_REQUEST_MAX_BYTES=200000000
    networks:
      - agr-literature

  dbz_connector:
    container_name: agr.literature.${ENV_STATE}.dbz.connector.${COMPOSE_PROJECT_NAME}
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    build:
      context: .
      dockerfile: docker/debezium_connector.dockerfile
    ports:
      - 8083:8083
    environment:
      - BOOTSTRAP_SERVERS=dbz_kafka:9092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_source_connect_configs
      - OFFSET_STORAGE_TOPIC=my_source_connect_offsets
      - CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE=false
      - CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE=false
    networks:
      - agr-literature

  dbz_setup:
    container_name: agr.literature.${ENV_STATE}.dbz.setup.${COMPOSE_PROJECT_NAME}
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    build:
      context: .
      dockerfile: docker/debezium_setup.dockerfile
    environment:
      ENV_STATE: "${ENV_STATE}"
      ELASTICSEARCH_HOST: "${ELASTICSEARCH_HOST}"
      ELASTICSEARCH_PORT: "${ELASTICSEARCH_PORT}"
      DEBEZIUM_CONNECTOR_HOST: "${DEBEZIUM_CONNECTOR_HOST}"
      DEBEZIUM_CONNECTOR_PORT: "${DEBEZIUM_CONNECTOR_PORT}"
      DEBEZIUM_INDEX_NAME: "${DEBEZIUM_INDEX_NAME}"
      DEBEZIUM_KSQLDB_HOST: "${DEBEZIUM_KSQLDB_HOST}"
      DEBEZIUM_KSQLDB_PORT: "${DEBEZIUM_KSQLDB_PORT}"
      PSQL_USERNAME: "${PSQL_USERNAME}"
      PSQL_PASSWORD: "${PSQL_PASSWORD}"
      PSQL_HOST: "${PSQL_HOST}"
      PSQL_PORT: "${PSQL_PORT}"
      PSQL_DATABASE: "${PSQL_DATABASE}"
      DEBEZIUM_STATUS_PATH: "${DEBEZIUM_STATUS_PATH:-/var/lib/debezium_status}"
      # Big production reindex waits, overridable per-deployment (e.g. prod's slower disk).
      # Defaults preserve current prod behavior; TEST mode ignores these (setup.sh keeps fixed test values).
      DBZ_KSQL_SETUP_SLEEP: "${DBZ_KSQL_SETUP_SLEEP:-1200}"
      DBZ_DATA_PROCESSING_SLEEP: "${DBZ_DATA_PROCESSING_SLEEP:-20000}"
    networks:
      - agr-literature
    volumes:
      - "${DEBEZIUM_STATUS_PATH:-agr-literature-debezium-status}:/var/lib/debezium_status"
    command:
      /setup.sh

  dbz_ksql_server:
    container_name: agr.literature.${ENV_STATE}.dbz.ksql.${COMPOSE_PROJECT_NAME}
    logging:
      driver: gelf
      options:
        gelf-address: 'udp://logs.alliancegenome.org:12201'
    # Custom image: stock ksqlDB 0.26.0 + the RocksDB config-setter jar baked onto the classpath
    # (SCRUM-6231). `make build` builds it; FROM still pins the upstream 0.26.0 as the base.
    build:
      context: .
      dockerfile: docker/ksqldb.dockerfile
    image: agr.literature.ksqldb-server:0.26.0
    depends_on:
      - dbz_kafka
      - dbz_connector
    ports:
      - "8088:8088"
    hostname: dbz_ksql_server
    environment:
      - KSQL_BOOTSTRAP_SERVERS=dbz_kafka:9092
      - KSQL_HOST_NAME=dbz_ksql_server
      - KSQL_APPLICATION_ID="cp-all-in-one"
      - KSQL_LISTENERS=http://0.0.0.0:8088
      # --- SCRUM-6231: reindex was disk-write-bound (ksqlDB RocksDB ~405 MB/s saturating EBS) ---
      # cache.max.bytes.buffering=0 forced ksqlDB to flush every record straight to RocksDB.
      # Re-enable the Kafka Streams record cache to batch/dedupe writes before they hit disk.
      # NOTE: this cache is PER persistent query (~32 CTAS in ksql_queries.ksql), so total
      # on-heap cache ~= 32 x value. Sized for the m5.4xlarge (16 vCPU / 64 GB):
      #   150 MB/query x ~32 ~= 4.8 GB of the 16 GB ksqlDB heap (bumped below).
      # Raised 100->150 MB to coalesce/dedupe more state-store updates in memory during the
      # ramp-up rebuild before they reach RocksDB (fewer SST writes). Steady-state latency is
      # unaffected: the 3s commit interval still bounds flush staleness. Can push toward 200 MB
      # (and heap to 24 GB) IF `free -g` shows headroom alongside Kafka/ES/connector on the box.
      # Env-overridable (default = dev m5.4xlarge sizing). Scale DOWN with the heap on smaller boxes:
      # the cache is PER persistent query (~32), so total on-heap cache ~= 32 x this value. Prod
      # m5.2xlarge (8g heap) uses DBZ_KSQL_CACHE_MAX_BYTES=78643200 (75 MiB -> ~2.4 GB across queries).
      - KSQL_KSQL_STREAMS_CACHE_MAX_BYTES_BUFFERING=${DBZ_KSQL_CACHE_MAX_BYTES:-157286400}
      # Commit/flush interval, balancing two MEASURED constraints from the dev reindex:
      #   - 10s added too much per-hop latency -> real-time CDC sync took >30s to reach ES and
      #     broke the debezium integration test.
      #   - 1s under-coalesces -> ~4600 write IOPS (vs ~2000 at 10s), riding the gp3 4500 cap
      #     (latency stayed healthy ~2.5ms, but no IOPS headroom left).
      # 3s coalesces more to restore IOPS headroom while keeping real-time sync ~15s (< 30s test).
      # Bulk throughput/latency are unaffected: the record cache (size pressure) drives batching.
      # 5s was tried (2026-06-24) but REVERTED: it pushed the deeper public_reference_joined path
      # over the 30s assertion -- test_real_time_data_sync failed (new ref reached the private index
      # but not the public index within 30s) and test_document_counts_match diverged (private=14,
      # public=13). The 5s disk benefit was unmeasured anyway (1s and 3s are disk-equivalent; only
      # 10s cut load, and that also breaks the test). 3s is the validated sweet spot.
      - KSQL_KSQL_STREAMS_COMMIT_INTERVAL_MS=3000
      # Bump ksqlDB heap from the 3g default to hold the (now larger) record caches + processing.
      # 16g is a conservative step from 12g: it fits ~4.8 GB of caches with ample processing
      # headroom while leaving RAM on the shared 64 GB box for Kafka/Zookeeper/connector/ES.
      # Env-overridable. Default 16g = dev m5.4xlarge (64 GB) sizing. On the 32 GB prod m5.2xlarge
      # (Debezium stack co-located with the API) set DBZ_KSQL_HEAP_SIZE=8g so ksqlDB heap + RocksDB
      # off-heap + Kafka/Connect + the API all fit. Xmx and Xms are pinned equal.
      - KSQL_HEAP_OPTS=-Xmx${DBZ_KSQL_HEAP_SIZE:-16g} -Xms${DBZ_KSQL_HEAP_SIZE:-16g}
      # --- SCRUM-6231 follow-up: trim reindex disk writes ---
      # (#6) Standby replicas duplicate every state-store write to a second RocksDB; keep at 0 so
      # the reindex writes each store once. (0 is the ksqlDB default; pinned here to be explicit.)
      - KSQL_KSQL_STREAMS_NUM_STANDBY_REPLICAS=0
      # NOTE: KSQL_KSQL_STREAMS_NUM_STREAM_THREADS=2 was A/B-tested on the dev box (2026-06-25) and
      # REVERTED -- it did NOT shave the disk peak and MORE THAN TRIPLED the run (still pinned at 8.8h,
      # vs ~2.4h baseline). Compaction write-amplification is driven by data volume + LSM structure,
      # NOT by thread count, so fewer threads only stretched the timeline while compaction kept the
      # disk pinned (report: reindex-report-threads2-2026-06-25.md). Lesson: env-only throttling is
      # EXHAUSTED -- no KSQL_* knob reduces RocksDB's on-disk write VOLUME. The volume-cutting levers
      # (RocksDB SST compression + universal compaction + a shared background-I/O rate limiter) live in
      # the rocksdb.config.setter JAR baked into docker/ksqldb.dockerfile and are wired via
      # KSQL_KSQL_STREAMS_ROCKSDB_CONFIG_SETTER + KSQL_ROCKSDB_* below.
      # (#5) Compress the bytes ksqlDB producers write to the changelog/repartition topics (Kafka
      # broker disk, same EBS). zstd for best ratio; CPU is spare during the I/O-bound reindex.
      - KSQL_KSQL_STREAMS_PRODUCER_COMPRESSION_TYPE=zstd
      # (#2) Let Kafka Streams reuse source topics as changelogs (skip duplicate changelog topics)
      # and merge repartition topics -> fewer internal-topic writes during the rebuild AND
      # permanently fewer changelog topics on the broker.
      # SAFE under our workflow: restart-debezium-* wipes Kafka + the connector and re-snapshots,
      # so ksqlDB always rebuilds its source tables from a complete, fresh source topic (no stale-
      # retention gap) and the topology change only ever takes effect at that clean rebuild.
      # Residual edge case: a ksqlDB-only restart that loses local RocksDB state WITHOUT a Kafka
      # re-snapshot would restore source KTables from the (possibly aged) source topic -> in that
      # case rebuild rather than bare-restart. Revert with =none if needed.
      - KSQL_KSQL_STREAMS_TOPOLOGY_OPTIMIZATION=all
      # --- RocksDB config-setter (baked into docker/ksqldb.dockerfile) -- the disk-write-VOLUME
      # levers env knobs can't reach. The class reads its tuning from the KSQL_KSQL_STREAMS_ROCKSDB_*
      # keys below (Kafka Streams passes them through to the setter); all have safe in-code defaults,
      # so the commented overrides can be flipped WITHOUT rebuilding the image.
      #   - compression: LZ4 upper levels + ZSTD bottommost -> fewer bytes per compaction.
      #   - universal compaction: trades transient disk space (abundant) for lower write-amp.
      #   - rate limiter: ONE shared, auto-tuned, writes-only cap = disk.max * fraction (~475 MB/s),
      #     leaving headroom for other ops. Toggle off if it lengthens the reindex (compression is
      #     the real volume win; the limiter is a usability guardrail).
      # Kafka Streams key is `rocksdb.config.setter` (NOT `...class`) -> env must omit _CLASS, else
      # Streams logs "isn't a known config" and the setter never registers (rocksdb.config.setter=null).
      - KSQL_KSQL_STREAMS_ROCKSDB_CONFIG_SETTER=org.alliancegenome.ksql.KsqlRocksDBConfigSetter
      # Made EXPLICIT (these match the config-setter's in-code defaults: compression/universal/ratelimit
      # all default true, KsqlRocksDBConfigSetter.java:55-57). Toggle off only to diagnose.
      - KSQL_KSQL_STREAMS_ROCKSDB_COMPRESSION_ENABLED=true
      - KSQL_KSQL_STREAMS_ROCKSDB_COMPACTION_UNIVERSAL=true
      - KSQL_KSQL_STREAMS_ROCKSDB_RATELIMIT_ENABLED=true
      # disk.max = the box's SUSTAINED EBS bandwidth, NOT the burst. Default 622854144 (594 MiB/s) =
      # dev m5.4xlarge sustained. Effective RocksDB write cap = disk.max x fraction. Override per box:
      # prod m5.2xlarge sustained baseline = 287.5 MB/s -> DBZ_ROCKSDB_DISK_MAX_BYTES_PER_SEC=287500000
      # (burst 593.75 MB/s lasts only ~30 min/24h, so a multi-hour reindex must size to baseline).
      - KSQL_KSQL_STREAMS_ROCKSDB_RATELIMIT_DISK_MAX_BYTES_PER_SEC=${DBZ_ROCKSDB_DISK_MAX_BYTES_PER_SEC:-622854144}
      - KSQL_KSQL_STREAMS_ROCKSDB_RATELIMIT_FRACTION=0.8
      - KSQL_OPTS=-Dmax.request.size=30000000 -Dmax.message.bytes=30000000 -Dmessage.max.bytes=30000000
    networks:
      - agr-literature

  # KSQLDB client for manual queries during development
  #
  # To start it:
  # - start the docker-compose service: $ docker-compose up -d dbz_ksql_cli
  # - run bash on the container: $ docker exec -it agr-literature-main-dbz_ksql_cli-1 bash
  # - determine the server IP address (for some reason this version of ksqldb cli does not work with host names): $ ping dbz_ksql_server
  # - start the ksql client connecting to the server: $ ksql http://<ksqldb_server_ip>:8088
  dbz_ksql_cli:
    image: confluentinc/ksqldb-cli:0.26.0
    depends_on:
      - dbz_ksql_server
    networks:
      - agr-literature
    entrypoint:
      - /bin/bash
    tty: true

  jenkins:
    image: jenkins/jenkins:2.540-jdk21
    volumes:
      - /usr/share/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - /usr/local/bin/docker-compose:/usr/bin/docker-compose
      - /usr/share/agr_env_files/.env.rdsdev_4001:/usr/share/agr_env_files/.env.api
      - /usr/share/agr_env_files/.env.dev_3001:/usr/share/agr_env_files/.env.ui
    ports:
      - "49001:8080"
      - "50000:50000"
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  file_uploader:
    build:
      context: .
      dockerfile: docker/file_uploader.dockerfile
    environment:
      - COGNITO_REGION=$COGNITO_REGION
      - COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID
      - COGNITO_CLIENT_ID=$COGNITO_CLIENT_ID
      - COGNITO_ADMIN_CLIENT_ID=$COGNITO_ADMIN_CLIENT_ID
      - COGNITO_ADMIN_CLIENT_SECRET=$COGNITO_ADMIN_CLIENT_SECRET
      - COGNITO_TOKEN_URL=$COGNITO_TOKEN_URL
      - API_PORT=$API_PORT
      - API_SERVER=$API_SERVER

  reverse_proxy:
    build:
      context: ./reverse_proxy
      dockerfile: Dockerfile
      args:
        BUILD_ENV: ${BUILD_ENV:-dev}
    ports:
      - "80:80"
    networks:
      - agr-literature
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home:/home:ro
      - /var/www:/var/www:ro
      - /var/log/agr_literature_service:/var/log/agr_literature_service:ro

volumes:
  agr-literature-pg-data:
  agr-literature-pgadmin-data:
  agr-literature-es-data:
  agr-logs:
  agr-literature-debezium-status:

networks:
  agr-literature:
